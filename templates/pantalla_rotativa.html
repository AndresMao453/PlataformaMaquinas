<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla rotativa FASECOL</title>
  <style>
    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0f172a;
      font-family:Arial, Helvetica, sans-serif;
    }

    #frameDashboard{
      width:100vw;
      height:100vh;
      border:0;
      background:#fff;
    }

    .tv-badge{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:9999;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(15,23,42,.82);
      color:#fff;
      font-size:14px;
      font-weight:900;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      backdrop-filter:blur(8px);
    }

    .tv-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:#22c55e;
      box-shadow:0 0 0 6px rgba(34,197,94,.16);
      animation:pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse{
      0%, 100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(.78); opacity:.65; }
    }
  </style>
</head>
<body>
  <iframe id="frameDashboard" title="Dashboard rotativo FASECOL"></iframe>

  <div class="tv-badge">
    <span class="tv-dot"></span>
    <span id="vistaActual">Cargando…</span>
  </div>

  <script>
    // Tiempo que permanece cada pantalla antes de pasar a la siguiente.
    // 90000 = 90 segundos. Puedes subirlo o bajarlo según el TV.
    const TIEMPO_CAMBIO_MS = 90000;

    const vistas = [
      {
        nombre: "Corte · THB · Productividad por hora",
        url: "/line/corte?auto=tv&machine=THB"
      },
      {
        nombre: "Crimpado · Aplicación · Máquina 1 · Productividad por hora",
        url: "/line/aplicacion?auto=tv&subcat=aplicacion&machine_id=1"
      }
    ];

    let indice = 0;
    const frame = document.getElementById("frameDashboard");
    const label = document.getElementById("vistaActual");

    function cambiarVista(){
      const vista = vistas[indice];
      label.textContent = vista.nombre;
      frame.src = vista.url + "&_tv_ts=" + Date.now();
      indice = (indice + 1) % vistas.length;
    }

    cambiarVista();
    setInterval(cambiarVista, TIEMPO_CAMBIO_MS);

    window.addEventListener("message", (ev) => {
      if(ev?.data?.type === "fasecol-tv-ready"){
        console.log("Vista lista:", ev.data.href);
      }
    });
  </script>
</body>
</html>
